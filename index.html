<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; padding: 20px;
        }
        #drzewo { 
            width: 95%; height: 800px; 
            border: 1px solid #333; margin: 20px auto; 
            background-color: #1e1e1e; border-radius: 8px;
        }
        h2 { text-align: center; color: #ffffff; }
    </style>
</head>
<body>

    <h2>Moje Drzewo Genealogiczne</h2>
    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() 
        {
            try {
                // Dodajemy timestamp, aby przeglądarka nie cache'owała starego pliku JSON
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odpowiedz.ok) {
                    let dane = await odpowiedz.json();
                    rysujGraf(dane);
                }
            } catch (e) { console.error("Błąd ładowania:", e); }
        }

        function rysujGraf(daneRodziny) {
    var wezly = [];
    var krawedzie = [];
    var unie = {}; 
    var narysowaneZwiazki = new Set();

    // 1. Mapowanie roczników do poziomów (żeby uniknąć gigantycznych przerw)
    // Znajdujemy najstarszy rok, żeby zacząć od poziomu 0
    let lata = daneRodziny.map(o => o.RokUrodzenia).filter(y => y < 2100); // ignorujemy błędy typu 2999
    let minRok = Math.min(...lata);

    daneRodziny.forEach(function(osoba) {
        let tekstLata = osoba.RokUrodzenia + (osoba.RokSmierci ? " - " + osoba.RokSmierci : "");
        
        // OBLICZANIE POZIOMU:
        // Każdy rok to poziom. Jeśli damy levelSeparation: 10, to 20 lat różnicy = 200px.
        // To wystarczy, by kafelki (wysokie na ok. 50px) się nie dotykały.
        let mojPoziom = osoba.RokUrodzenia - minRok;

        wezly.push({
            id: osoba.Id,
            label: osoba.Imie + ' ' + osoba.Nazwisko + '\n' + tekstLata,
            level: mojPoziom, 
            shape: 'box',
            widthConstraint: { minimum: 140, maximum: 140 },
            color: { 
                background: osoba.RokSmierci ? '#1a252f' : '#2c3e50', 
                border: '#34495e' 
            },
            font: { color: '#ffffff', size: 14 }
        });

        // ŁĄCZENIE RODZICÓW I DZIECI
        if (osoba.IdOjca && osoba.IdMatki) {
            let para = [osoba.IdOjca, osoba.IdMatki].sort((a, b) => a - b).join('_');
            let idUnii = "unia_" + para;

            if (!unie[idUnii]) {
                unie[idUnii] = true;
                
                // Szukamy rocznika młodszego rodzica, by unia była tuż pod nimi
                let rokOjca = daneRodziny.find(o => o.Id == osoba.IdOjca)?.RokUrodzenia || minRok;
                let rokMatki = daneRodziny.find(o => o.Id == osoba.IdMatki)?.RokUrodzenia || minRok;
                let poziomUnii = (Math.max(rokOjca, rokMatki) - minRok) + 5; // +5 lat pod rodzicami

                wezly.push({ 
                    id: idUnii, 
                    level: poziomUnii,
                    shape: 'dot', size: 0, color: 'rgba(0,0,0,0)' 
                });
                
                krawedzie.push({ from: osoba.IdOjca, to: idUnii, arrows: '', color: '#888888' });
                krawedzie.push({ from: osoba.IdMatki, to: idUnii, arrows: '', color: '#888888' });
            }
            krawedzie.push({ from: idUnii, to: osoba.Id, arrows: 'to', color: '#888888' });

        } else if (osoba.IdOjca || osoba.IdMatki) {
            let parentId = osoba.IdOjca || osoba.IdMatki;
            krawedzie.push({ from: parentId, to: osoba.Id, arrows: 'to', color: '#888888' });
        }

        // Małżeństwo bezdzietne
        if (osoba.IdPartnera) {
            let para = [osoba.Id, osoba.IdPartnera].sort((a, b) => a - b).join('_');
            if (!narysowaneZwiazki.has(para)) {
                krawedzie.push({ from: osoba.Id, to: osoba.IdPartnera, arrows: '', color: '#555555', dashes: [5, 5] });
                narysowaneZwiazki.add(para);
            }
        }
    });

    var opcje = {
        layout: { 
            hierarchical: { 
                enabled: true,
                direction: 'UD', 
                sortMethod: 'directed',
                levelSeparation: 10,
                shakeTowards: 'leaves',// 10px na każdy rok życia. 20 lat = 200px odstępu.
                nodeSpacing: 500,    // Szerokość między gałęziami
                parentCentralization: false,
                blockShifting: false, // Zapobiega "prostowaniu" gałęzi do jednej linii
                edgeMinimization: false
                
            } 
        },
        physics: false,
        edges: {
            smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.5 }
        }
    };

    new vis.Network(document.getElementById('drzewo'), { nodes: wezly, edges: krawedzie }, opcje);
}

        zaladujDane();
    </script>
</body>
</html>
