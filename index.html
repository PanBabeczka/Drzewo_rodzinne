<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; padding: 20px;
        }
        #drzewo { 
            width: 95%; height: 800px; 
            border: 1px solid #333; margin: 20px auto; 
            background-color: #1e1e1e; border-radius: 8px;
        }
        h2 { text-align: center; color: #ffffff; }
    </style>
</head>
<body>

    <h2>Moje Drzewo Genealogiczne</h2>
    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() 
        {
            try {
                // Dodajemy timestamp, aby przeglądarka nie cache'owała starego pliku JSON
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odpowiedz.ok) {
                    let dane = await odpowiedz.json();
                    rysujGraf(dane);
                }
            } catch (e) { console.error("Błąd ładowania:", e); }
        }

        function rysujGraf(daneRodziny) {
    var wezly = [];
    var krawedzie = [];
    var unie = {}; 
    var narysowaneZwiazki = new Set();

    daneRodziny.forEach(function(osoba) {
        let lata = osoba.RokUrodzenia + (osoba.RokSmierci ? " - " + osoba.RokSmierci : "");

        // DODAJEMY OSOBĘ (Bez pola 'level'!)
        wezly.push({
            id: osoba.Id,
            label: osoba.Imie + ' ' + osoba.Nazwisko + '\n' + lata,
            shape: 'box',
            widthConstraint: { minimum: 140, maximum: 140 },
            color: { 
                background: osoba.RokSmierci ? '#1a252f' : '#2c3e50', 
                border: '#34495e' 
            },
            font: { color: '#ffffff', size: 14 }
        });

        // ŁĄCZENIE RODZICÓW I DZIECI
        if (osoba.IdOjca && osoba.IdMatki) {
            let para = [osoba.IdOjca, osoba.IdMatki].sort((a, b) => a - b).join('_');
            let idUnii = "unia_" + para;

            if (!unie[idUnii]) {
                unie[idUnii] = true;
                
                // DODAJEMY KROPKĘ UNII (Bez pola 'level'!)
                wezly.push({ 
                    id: idUnii, 
                    shape: 'dot', 
                    size: 0, 
                    color: 'rgba(0,0,0,0)' 
                });
                
                krawedzie.push({ from: osoba.IdOjca, to: idUnii, arrows: '', color: '#888888' });
                krawedzie.push({ from: osoba.IdMatki, to: idUnii, arrows: '', color: '#888888' });
            }
            krawedzie.push({ from: idUnii, to: osoba.Id, arrows: 'to', color: '#888888' });

        } else if (osoba.IdOjca || osoba.IdMatki) {
            let parentId = osoba.IdOjca || osoba.IdMatki;
            krawedzie.push({ from: parentId, to: osoba.Id, arrows: 'to', color: '#888888' });
        }

        // MAŁŻEŃSTWO BEZDZIETNE
        if (osoba.IdPartnera) {
            let para = [osoba.Id, osoba.IdPartnera].sort((a, b) => a - b).join('_');
            let maDzieci = daneRodziny.some(d => (d.IdOjca == osoba.Id && d.IdMatki == osoba.IdPartnera) || (d.IdMatki == osoba.Id && d.IdOjca == osoba.IdPartnera));
            
            if (!narysowaneZwiazki.has(para) && !maDzieci) {
                krawedzie.push({ from: osoba.Id, to: osoba.IdPartnera, arrows: '', color: '#555555', dashes: [5, 5] });
                narysowaneZwiazki.add(para);
            }
        }
    });

    var opcje = {
        layout: { 
            hierarchical: { 
                direction: 'UD', 
                sortMethod: 'directed', // Biblioteka sama wyliczy poziomy na podstawie krawędzi
                levelSeparation: 150, 
                nodeSpacing: 250,
                parentCentralization: true
            } 
        },
        physics: false,
        edges: {
            smooth: { 
                type: 'cubicBezier', 
                forceDirection: 'vertical', 
                roundness: 0.5 
            }
        }
    };

    new vis.Network(document.getElementById('drzewo'), { nodes: wezly, edges: krawedzie }, opcje);
}

        zaladujDane();
    </script>
</body>
</html>
