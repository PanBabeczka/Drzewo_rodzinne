<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; padding: 20px;
        }
        #drzewo { 
            width: 95%; height: 800px; 
            border: 1px solid #333; margin: 20px auto; 
            background-color: #1e1e1e; border-radius: 8px;
        }
        h2 { text-align: center; color: #ffffff; }
    </style>
</head>
<body>

    <h2>Moje Drzewo Genealogiczne</h2>
    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                // Dodajemy timestamp, aby przeglądarka nie cache'owała starego pliku JSON
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odpowiedz.ok) {
                    let dane = await odpowiedz.json();
                    rysujGraf(dane);
                }
            } catch (e) { console.error("Błąd ładowania:", e); }
        }

        function rysujGraf(daneRodziny) {
            var wezly = [];
            var krawedzie = [];
            var unie = {}; 
            var narysowaneZwiazki = new Set(); // Do śledzenia narysowanych linii małżeńskich

            // 1. Najpierw budujemy mapę roczników
            var poziomy = {};
            daneRodziny.forEach(o => { poziomy[o.Id] = o.RokUrodzenia; });

            daneRodziny.forEach(function(osoba) {
                // --- FORMATOWANIE ETYKIETY (Lata życia) ---
                let lata = "ur. " + osoba.RokUrodzenia;
                if (osoba.RokSmierci) {
                    lata = osoba.RokUrodzenia + " - " + osoba.RokSmierci;
                }

                // --- DODAWANIE OSOBY ---
                wezly.push({
                    id: osoba.Id,
                    label: osoba.Imie + ' ' + osoba.Nazwisko + '\n' + lata,
                    level: osoba.RokUrodzenia, 
                    shape: 'box',
                    // Stylizacja: zmarli są ciemniejsi
                    color: { 
                        background: osoba.RokSmierci ? '#1a252f' : '#2c3e50', 
                        border: '#34495e' 
                    },
                    font: { color: osoba.RokSmierci ? '#888888' : '#ffffff', size: 15 }
                });

                // --- LINIE MAŁŻEŃSKIE (Bezdzietne) ---
                if (osoba.IdPartnera) {
                    let para = [osoba.Id, osoba.IdPartnera].sort((a, b) => a - b).join('_');
                    // Sprawdzamy, czy ta para nie ma dzieci (jeśli mają, unia zajmie się linią)
                    let maDzieci = daneRodziny.some(d => (d.IdOjca == osoba.Id && d.IdMatki == osoba.IdPartnera) || (d.IdMatki == osoba.Id && d.IdOjca == osoba.IdPartnera));
                    
                    if (!narysowaneZwiazki.has(para) && !maDzieci) {
                        krawedzie.push({ 
                            from: osoba.Id, to: osoba.IdPartnera, 
                            arrows: '', color: '#555555', dashes: [5, 5] 
                        });
                        narysowaneZwiazki.add(para);
                    }
                }

                // --- LINIE RODZICIELSKIE (Z dziećmi) ---
                let maObojeRodzicow = osoba.IdOjca && osoba.IdMatki;

                if (maObojeRodzicow) {
                    let idUnii = "unia_" + [osoba.IdOjca, osoba.IdMatki].sort().join('_');
                    
                    if (!unie[idUnii]) {
                        unie[idUnii] = true;
                        // Kropka unii 5 pikseli pod MŁODSZYM rodzicem
                        let poziomUnii = Math.max(poziomy[osoba.IdOjca], poziomy[osoba.IdMatki]) + 5;
                        
                        wezly.push({ 
                            id: idUnii, level: poziomUnii, 
                            shape: 'dot', size: 0, color: 'rgba(0,0,0,0)' 
                        });
                        
                        krawedzie.push({ from: osoba.IdOjca, to: idUnii, arrows: '', color: '#888888' });
                        krawedzie.push({ from: osoba.IdMatki, to: idUnii, arrows: '', color: '#888888' });
                    }
                    krawedzie.push({ from: idUnii, to: osoba.Id, arrows: 'to', color: '#888888' });
                } else {
                    // Tylko jeden rodzic
                    if (osoba.IdOjca) krawedzie.push({ from: osoba.IdOjca, to: osoba.Id, arrows: 'to', color: '#888888' });
                    if (osoba.IdMatki) krawedzie.push({ from: osoba.IdMatki, to: osoba.Id, arrows: 'to', color: '#888888' });
                }
            });

            var pojemnik = document.getElementById('drzewo');
            var opcje = {
                layout: { 
                    hierarchical: { 
                        direction: 'UD', 
                        levelSeparation: 15, // Gęsta oś czasu
                        nodeSpacing: 200, 
                        parentCentralization: true 
                    } 
                },
                edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 } },
                physics: false
            };

            new vis.Network(pojemnik, { nodes: wezly, edges: krawedzie }, opcje);
        }

        zaladujDane();
    </script>
</body>
</html>
