<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Drzewo Genealogiczne - Układ T</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        #drzewo { width: 100vw; height: 100vh; background-color: #121212; }
        .header { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: none; border: 1px solid #444; }
        h2 { margin: 0; color: #4dabf7; }
        p { font-size: 0.8em; color: #aaa; margin: 5px 0 0 0; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Moje Drzewo</h2>
        <p>Układ typu "T" na osi czasu | Łuki sterowane przez roundness</p>
    </div>

    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                let odp = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odp.ok) { rysujGraf(await odp.json()); }
            } catch (e) { console.error(e); }
        }

        function rysujGraf(daneRodziny) {
            const SKALA_Y = 15; 
            let nodes = [];
            let edges = [];
            let unie = {}; 

            const lata = daneRodziny.map(o => o.RokUrodzenia).filter(r => r < 2100);
            const minRok = Math.min(...lata);

            // 1. Tworzenie węzłów osób
            daneRodziny.forEach(osoba => {
                let rok = osoba.RokUrodzenia > 2026 ? 2024 : osoba.RokUrodzenia;
                nodes.push({
                    id: osoba.Id,
                    label: `<b>${osoba.Imie} ${osoba.Nazwisko}</b>\n${osoba.RokUrodzenia}`,
                    shape: 'box',
                    x: (Math.random() - 0.5) * 3000, // Szeroki start dla lepszej fizyki
                    y: (rok - minRok) * SKALA_Y,
                    fixed: { y: true, x: false },
                    font: { multi: 'html', color: '#ffffff' },
                    color: { background: '#2c3e50', border: '#4dabf7' },
                    margin: 15, // Odstęp tekstu od krawędzi kafelka
                    widthConstraint: { minimum: 130 }
                });
            });

            // 2. Tworzenie "Mostków" (Litera T)
            daneRodziny.forEach(osoba => {
                if (osoba.IdOjca && osoba.IdMatki) {
                    let para = [osoba.IdOjca, osoba.IdMatki].sort((a,b) => a-b).join('_');
                    let idUnii = "unia_" + para;

                    if (!unie[idUnii]) {
                        unie[idUnii] = true;
                        let r1 = daneRodziny.find(o => o.Id == osoba.IdOjca).RokUrodzenia;
                        let r2 = daneRodziny.find(o => o.Id == osoba.IdMatki).RokUrodzenia;
                        let rokUnii = Math.max(r1, r2) + 2; 

                        nodes.push({
                            id: idUnii,
                            y: (rokUnii - minRok) * SKALA_Y,
                            shape: 'dot', size: 0, color: 'rgba(0,0,0,0)',
                            fixed: { y: true, x: false }
                        });

                        // Ramiona T - roundness steruje wygięciem
                        edges.push({ from: osoba.IdOjca, to: idUnii, arrows: '', color: '#888', width: 2 });
                        edges.push({ from: osoba.IdMatki, to: idUnii, arrows: '', color: '#888', width: 2 });
                    }
                    edges.push({ from: idUnii, to: osoba.Id, arrows: 'to', color: '#888', width: 2 });
                } else if (osoba.IdOjca || osoba.IdMatki) {
                    edges.push({ from: osoba.IdOjca || osoba.IdMatki, to: osoba.Id, arrows: 'to', color: '#888', width: 2 });
                }
            });

            const options = {
                physics: {
                    enabled: true,
                    solver: 'repulsion',
                    repulsion: { 
                        nodeDistance: 600, // Duża wartość = szerokie drzewo i brak nachodzenia
                        centralGravity: 0, 
                        springLength: 250,
                        damping: 0.1
                    },
                    stabilization: { iterations: 200 }
                },
                edges: {
                    smooth: { 
                        enabled: true, 
                        type: 'cubicBezier', 
                        forceDirection: 'vertical', // Linie omijają kafelki od góry/dołu
                        roundness: 0.5 // Zmieniaj od 0.1 do 1.0, aby dostosować łuk
                    }
                },
                interaction: { dragNodes: true, zoomView: true, dragView: true }
            };

            new vis.Network(document.getElementById('drzewo'), { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, options);
        }
        zaladujDane();
    </script>
</body>
</html>
