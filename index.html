<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktywne Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div id="legenda" class="glass-panel">
        <button id="toggle-btn" onclick="toggleLegenda()">−</button>
        <div class="legenda-tresc">
            <h3>Legenda</h3>
            <div class="legenda-item"><div class="strzalka"></div> Relacja rodzice-dzieci</div>
            <div class="legenda-item"><div class="linia dashed"></div> Związek (bez dzieci)</div>
            <div class="legenda-item"><div class="kwadrat alive"></div> Osoba żyjąca</div>
            <div class="legenda-item"><div class="kwadrat deceased"></div> Osoba zmarła</div>
            <p class="hint">Oś pionowa reprezentuje czas (rok urodzenia)</p>
        </div>
    </div>

    <div id="drzewo"></div>

    <script src="script.js"></script>
</body>
</html>
