<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 20px;
        }
        
        #drzewo { 
            width: 95%; 
            height: 750px; 
            border: 1px solid #333; 
            margin: 20px auto; 
            background-color: #1e1e1e; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h2 { margin-top: 10px; color: #ffffff; }
    </style>
</head>
<body>

    <h2>Moje Drzewo Genealogiczne</h2>
    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime(), { cache: "no-store" });
                
                if (odpowiedz.ok) {
                    let daneRodziny = await odpowiedz.json();
                    rysujGraf(daneRodziny);
                } else {
                    console.error("Nie znaleziono pliku na serwerze GitHuba.");
                }
            } catch (error) {
                console.error("Błąd połączenia:", error);
            }
        }

        function rysujGraf(daneRodziny) {
            var wezly = [];
            var krawedzie = [];
            
            var dostepneId = new Set();
            daneRodziny.forEach(osoba => dostepneId.add(osoba.Id));

            var unie = {}; 

            daneRodziny.forEach(function(osoba) {
                wezly.push({
                    id: osoba.Id,
                    label: osoba.Imie + ' ' + osoba.Nazwisko + '\nUr: ' + osoba.RokUrodzenia,
                    shape: 'box',
                    color: {
                        background: '#2c3e50',
                        border: '#34495e',
                        highlight: { background: '#3498db', border: '#2980b9' }
                    },
                    font: { size: 16, color: '#ffffff' },
                    margin: 10
                });

                let idOjca = osoba.IdOjca;
                let idMatki = osoba.IdMatki;

                let maOjca = idOjca !== null && idOjca !== 0 && dostepneId.has(idOjca);
                let maMatke = idMatki !== null && idMatki !== 0 && dostepneId.has(idMatki);

                if (maOjca && maMatke) {
                    let idUnii = "unia_" + (idOjca < idMatki ? idOjca + "_" + idMatki : idMatki + "_" + idOjca);

                    if (!unie[idUnii]) {
                        unie[idUnii] = true;
                        
                        // KROPA ZŁĄCZENIA JEST TERAZ CAŁKOWICIE NIEWIDZIALNA
                        wezly.push({ 
                            id: idUnii, 
                            shape: 'dot', 
                            size: 0, // Rozmiar zero
                            color: 'rgba(0,0,0,0)', // W 100% przezroczysta
                            label: '' 
                        });
                        
                        krawedzie.push({ from: idOjca, to: idUnii, arrows: '', color: '#888888' });
                        krawedzie.push({ from: idMatki, to: idUnii, arrows: '', color: '#888888' });
                    }
                    
                    krawedzie.push({ from: idUnii, to: osoba.Id, arrows: 'to', color: '#888888' });

                } else {
                    if (maOjca) {
                        krawedzie.push({ from: idOjca, to: osoba.Id, arrows: 'to', color: '#888888' });
                    }
                    if (maMatke) {
                        krawedzie.push({ from: idMatki, to: osoba.Id, arrows: 'to', color: '#888888' });
                    }
                }
            });

            var pojemnik = document.getElementById('drzewo');
            var daneGrafu = { nodes: new vis.DataSet(wezly), edges: new vis.DataSet(krawedzie) };
            
            var opcje = {
                layout: { 
                    hierarchical: { 
                        direction: 'UD', 
                        sortMethod: 'directed',
                        levelSeparation: 100, // Zmniejszyłem odległość w pionie, by linia rodziców wyglądała bardziej naturalnie
                        nodeSpacing: 250,     // Zwiększyłem odległość w poziomie - pomaga omijać przecięcia kresek!
                        treeSpacing: 300,
                        blockShifting: true,         // Włącza algorytm przesuwania gałęzi
                        edgeMinimization: true,      // Wymusza minimalizację krzyżowania się linii
                        parentCentralization: true   // Zawsze stawia rodziców równo nad dziećmi
                    } 
                },
                edges: {
                    smooth: {
                        type: 'cubicBezier', 
                        forceDirection: 'vertical',
                        roundness: 0 // Zostawiamy 0 dla ładnych, prostopadłych linii (jak kable na schemacie)
                    }
                },
                physics: false 
            };

            new vis.Network(pojemnik, daneGrafu, opcje);
        }

        zaladujDane();
    </script>
</body>
</html>
