<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Interaktywne Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }
        #drzewo { 
            width: 100vw; 
            height: 100vh; 
            background-color: #121212;
        }
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        h2 { margin: 0; color: #4dabf7; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p { font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Drzewo Rodzinne</h2>
        <p>Oś pionowa: Rok urodzenia</p>
    </div>

    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                // Fetch z timestampem, aby uniknąć cache
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odpowiedz.ok) {
                    let dane = await odpowiedz.json();
                    rysujGraf(dane);
                }
            } catch (e) {
                console.error("Błąd ładowania JSON:", e);
            }
        }

        function rysujGraf(daneRodziny) {
            const container = document.getElementById('drzewo');
            const SKALA_Y = 15; // 1 rok = 15 pikseli wysokości
            
            let nodes = [];
            let edges = [];

            // Znajdujemy najwcześniejszy rok, aby zacząć rysować od góry ekranu
            const lata = daneRodziny.map(o => o.RokUrodzenia).filter(r => r < 2100);
            const minRok = Math.min(...lata);

            daneRodziny.forEach(osoba => {
                // Obliczamy sztywną pozycję Y na podstawie roku
                // Jeśli ktoś ma rok 2999 (błąd), ustawiamy go niżej (np. na rok 2024)
                let rok = osoba.RokUrodzenia > 2026 ? 2024 : osoba.RokUrodzenia;
                let posY = (rok - minRok) * SKALA_Y;

                // Dodanie osoby
                nodes.push({
                    id: osoba.Id,
                    label: `<b>${osoba.Imie} ${osoba.Nazwisko}</b>\n${osoba.RokUrodzenia}${osoba.RokSmierci ? ' - '+osoba.RokSmierci : ''}`,
                    shape: 'box',
                    x: Math.random() * 100, // Losowy start X, fizyka zajmie się resztą
                    y: posY,
                    fixed: { y: true, x: false }, // Blokujemy pion (oś czasu), pozwalamy na ruch w poziomie
                    font: { multi: 'html', color: '#ffffff', size: 14 },
                    color: {
                        background: '#2c3e50',
                        border: '#4dabf7',
                        highlight: { background: '#3498db', border: '#fff' }
                    },
                    margin: 10,
                    widthConstraint: { minimum: 120, maximum: 180 }
                });

                // Relacje rodzicielskie (bez kropek unii - czyściej w trybie fizycznym)
                if (osoba.IdOjca) {
                    edges.push({ from: osoba.IdOjca, to: osoba.Id, color: '#555', arrows: 'to' });
                }
                if (osoba.IdMatki) {
                    edges.push({ from: osoba.IdMatki, to: osoba.Id, color: '#555', arrows: 'to' });
                }

                // Partnerstwo (linia przerywana)
                if (osoba.IdPartnera) {
                    // Rysujemy tylko jedną linię dla pary (sprawdzamy ID by nie dublować)
                    if (osoba.Id < osoba.IdPartnera) {
                        edges.push({ 
                            from: osoba.Id, 
                            to: osoba.IdPartnera, 
                            dashes: [5, 5], 
                            color: '#e67e22', 
                            arrows: '' 
                        });
                    }
                }
            });

            const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };

            const options = {
                physics: {
                    enabled: true,
                    solver: 'repulsion',
                    repulsion: {
                        nodeDistance: 250, // Odstęp poziomy między kafelkami
                        centralGravity: 0,
                        springLength: 150,
                        damping: 0.09
                    },
                    stabilization: { iterations: 150 }
                },
                edges: {
                    smooth: {
                        type: 'cubicBezier',
                        forceDirection: 'vertical',
                        roundness: 0.4
                    }
                },
                interaction: {
                    dragNodes: true,
                    zoomView: true,
                    dragView: true
                }
            };

            new vis.Network(container, data, options);
        }

        zaladujDane();
    </script>
</body>
</html>
