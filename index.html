<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Interaktywne Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }
        #drzewo { 
            width: 100vw; 
            height: 100vh; 
            background-color: #121212;
        }
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #333;
        }
        h2 { margin: 0; color: #4dabf7; font-size: 1.5em; }
        p { font-size: 0.85em; color: #aaa; margin: 5px 0 0 0; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Drzewo Rodzinne</h2>
        <p>Os Y: Rok urodzenia | Linie łączą się u rodziców</p>
    </div>

    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odpowiedz.ok) {
                    let dane = await odpowiedz.json();
                    rysujGraf(dane);
                }
            } catch (e) { console.error("Błąd:", e); }
        }

        function rysujGraf(daneRodziny) {
            const container = document.getElementById('drzewo');
            const SKALA_Y = 15; 
            
            let nodes = [];
            let edges = [];
            let unie = {}; 

            const lata = daneRodziny.map(o => o.RokUrodzenia).filter(r => r < 2100);
            const minRok = Math.min(...lata);

            // 1. Tworzymy węzły osób
            daneRodziny.forEach(osoba => {
                let rok = osoba.RokUrodzenia > 2026 ? 2024 : osoba.RokUrodzenia;
                let posY = (rok - minRok) * SKALA_Y;

                nodes.push({
                    id: osoba.Id,
                    label: `<b>${osoba.Imie} ${osoba.Nazwisko}</b>\n${osoba.RokUrodzenia}`,
                    shape: 'box',
                    x: (Math.random() - 0.5) * 2000, 
                    y: posY,
                    fixed: { y: true, x: false }, 
                    font: { multi: 'html', color: '#ffffff', size: 14 },
                    color: { background: '#2c3e50', border: '#4dabf7' },
                    margin: 10,
                    widthConstraint: { minimum: 130, maximum: 180 }
                });
            });

            // 2. Tworzymy relacje i punkty złączenia (Unie)
            daneRodziny.forEach(osoba => {
                if (osoba.IdOjca && osoba.IdMatki) {
                    // Tworzymy unikalny klucz dla pary rodziców
                    let para = [osoba.IdOjca, osoba.IdMatki].sort((a,b) => a-b).join('_');
                    let idUnii = "unia_" + para;

                    if (!unie[idUnii]) {
                        unie[idUnii] = true;
                        
                        // Znajdujemy rok młodszego rodzica, by unia była tuż pod nimi
                        let r1 = daneRodziny.find(o => o.Id == osoba.IdOjca).RokUrodzenia;
                        let r2 = daneRodziny.find(o => o.Id == osoba.IdMatki).RokUrodzenia;
                        let rokUnii = Math.max(r1, r2) + 3; // 3 lata pod rodzicami
                        
                        nodes.push({
                            id: idUnii,
                            x: (Math.random() - 0.5) * 2000,
                            y: (rokUnii - minRok) * SKALA_Y,
                            shape: 'dot',
                            size: 0,
                            color: 'rgba(0,0,0,0)',
                            fixed: { y: true, x: false }
                        });

                        // Linie od rodziców do punktu złączenia
                        edges.push({ from: osoba.IdOjca, to: idUnii, color: '#666', arrows: '' });
                        edges.push({ from: osoba.IdMatki, to: idUnii, color: '#666', arrows: '' });
                    }
                    // Jedna linia od punktu złączenia do dziecka
                    edges.push({ from: idUnii, to: osoba.Id, color: '#666', arrows: 'to' });

                } else if (osoba.IdOjca || osoba.IdMatki) {
                    // Samotny rodzic - bezpośrednia linia
                    let rodzicId = osoba.IdOjca || osoba.IdMatki;
                    edges.push({ from: rodzicId, to: osoba.Id, color: '#666', arrows: 'to' });
                }

                // Partnerstwo bezdzietne (linia przerywana)
                if (osoba.IdPartnera && osoba.Id < osoba.IdPartnera) {
                    let maDzieci = daneRodziny.some(d => d.IdOjca && d.IdMatki && 
                        ((d.IdOjca == osoba.Id && d.IdMatki == osoba.IdPartnera) || 
                         (d.IdMatki == osoba.Id && d.IdOjca == osoba.IdPartnera)));
                    
                    if (!maDzieci) {
                        edges.push({ from: osoba.Id, to: osoba.IdPartnera, dashes: [5, 5], color: '#e67e22' });
                    }
                }
            });

            const options = {
                physics: {
                    enabled: true,
                    solver: 'repulsion',
                    repulsion: {
                        nodeDistance: 450, 
                        centralGravity: 0,
                        springLength: 200,
                        damping: 0.2
                    },
                    stabilization: { iterations: 150 }
                },
                edges: {
                    smooth: {
                        enabled: true,
                        type: 'cubicBezier',
                        forceDirection: 'vertical',
                        roundness: 0.5
                    }
                },
                interaction: { dragNodes: true, zoomView: true, dragView: true }
            };

            new vis.Network(container, { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, options);
        }

        zaladujDane();
    </script>
</body>
</html>
