<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Interaktywne Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }
        #drzewo { 
            width: 100vw; 
            height: 100vh; 
            background-color: #121212;
        }
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
        h2 { margin: 0; color: #4dabf7; }
        p { font-size: 0.8em; color: #aaa; margin: 5px 0 0 0; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Drzewo Rodzinne</h2>
        <p>Pion: Rok urodzenia | Możesz przesuwać kafelki na boki</p>
    </div>

    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                // Fetch z timestampem, żeby zawsze brało najnowszy plik z GitHub
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime());
                if (odpowiedz.ok) {
                    let dane = await odpowiedz.json();
                    rysujGraf(dane);
                }
            } catch (e) {
                console.error("Błąd ładowania:", e);
            }
        }

        function rysujGraf(daneRodziny) {
            const container = document.getElementById('drzewo');
            const SKALA_Y = 15; // 1 rok = 15 pikseli wysokości
            
            let nodes = [];
            let edges = [];

            // Filtracja lat i szukanie najstarszego przodka
            const lata = daneRodziny.map(o => o.RokUrodzenia).filter(r => r < 2100);
            const minRok = Math.min(...lata);

            daneRodziny.forEach(osoba => {
                // 1. Pozycjonowanie pionowe (Rok urodzenia)
                let rok = osoba.RokUrodzenia > 2026 ? 2024 : osoba.RokUrodzenia;
                let posY = (rok - minRok) * SKALA_Y;

                // 2. Dodanie osoby
                nodes.push({
                    id: osoba.Id,
                    label: `<b>${osoba.Imie} ${osoba.Nazwisko}</b>\n${osoba.RokUrodzenia}${osoba.RokSmierci ? ' - '+osoba.RokSmierci : ''}`,
                    shape: 'box',
                    // Nadajemy bardzo szeroki start, żeby fizyka miała łatwiej rozsunąć gałęzie
                    x: (Math.random() - 0.5) * 3000, 
                    y: posY,
                    // BLOKUJEMY PION (Y), pozwalamy na ruch w poziomie (X)
                    fixed: { y: true, x: false }, 
                    font: { multi: 'html', color: '#ffffff', size: 14 },
                    color: {
                        background: '#2c3e50',
                        border: '#4dabf7'
                    },
                    margin: 10,
                    widthConstraint: { minimum: 130, maximum: 180 }
                });

                // 3. Połączenia rodzice -> dzieci
                if (osoba.IdOjca) {
                    edges.push({ from: osoba.IdOjca, to: osoba.Id, color: '#666', arrows: 'to' });
                }
                if (osoba.IdMatki) {
                    edges.push({ from: osoba.IdMatki, to: osoba.Id, color: '#666', arrows: 'to' });
                }

                // 4. Połączenia partnerów (mąż/żona)
                if (osoba.IdPartnera && osoba.Id < osoba.IdPartnera) {
                    edges.push({ 
                        from: osoba.Id, 
                        to: osoba.IdPartnera, 
                        dashes: [5, 5], 
                        color: '#e67e22', 
                        arrows: '' 
                    });
                }
            });

            const data = { 
                nodes: new vis.DataSet(nodes), 
                edges: new vis.DataSet(edges) 
            };

            const options = {
                physics: {
                    enabled: true,
                    solver: 'repulsion',
                    repulsion: {
                        nodeDistance: 500, // TO ROZSUWA DRZEWO NA BOKI (zwiększ jeśli za wąskie)
                        centralGravity: 0,
                        springLength: 300,
                        damping: 0.1
                    },
                    stabilization: { iterations: 100 }
                },
                edges: {
                    smooth: {
                        enabled: true,
                        type: 'cubicBezier', // Linie w formie eleganckich łuków
                        forceDirection: 'vertical',
                        roundness: 0.7
                    }
                },
                interaction: {
                    dragNodes: true,
                    zoomView: true,
                    dragView: true
                }
            };

            new vis.Network(container, data, options);
        }

        zaladujDane();
    </script>
</body>
</html>
