<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        /* Włączony Dark Mode z automatu */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #121212; /* Ciemne tło */
            color: #e0e0e0; /* Jasny tekst */
            margin: 0;
            padding: 20px;
        }
        
        #drzewo { 
            width: 95%; 
            height: 750px; 
            border: 1px solid #333; /* Ciemniejsza ramka */
            margin: 20px auto; 
            background-color: #1e1e1e; /* Tło obszaru roboczego grafu */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h2 { margin-top: 10px; color: #ffffff; }
    </style>
</head>
<body>

    <h2>Moje Drzewo Genealogiczne</h2>
    
    <div id="drzewo"></div>

    <script type="text/javascript">
        // 1. GŁÓWNA FUNKCJA POBIERAJĄCA DANE
        async function zaladujDane() {
            try {
                // Wymuszamy ominięcie cache przez doklejenie czasu
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime(), { cache: "no-store" });
                
                if (odpowiedz.ok) {
                    let daneRodziny = await odpowiedz.json();
                    rysujGraf(daneRodziny);
                } else {
                    console.error("Nie znaleziono pliku na serwerze GitHuba.");
                }
            } catch (error) {
                console.error("Błąd połączenia:", error);
            }
        }

        // 2. FUNKCJA RYSUJĄCA DRZEWO Z T-JUNCTION (POŁĄCZENIE RODZICÓW)
        function rysujGraf(daneRodziny) {
            var wezly = [];
            var krawedzie = [];
            var unie = {}; // Słownik do zapisywania połączonych par rodziców

            daneRodziny.forEach(function(osoba) {
                // Tworzymy główny kafelek dla osoby (ciemny motyw)
                wezly.push({
                    id: osoba.Id,
                    label: osoba.Imie + ' ' + osoba.Nazwisko + '\nUr: ' + osoba.RokUrodzenia,
                    shape: 'box',
                    color: {
                        background: '#2c3e50', // Ciemny niebiesko-szary
                        border: '#34495e',
                        highlight: { background: '#3498db', border: '#2980b9' }
                    },
                    font: { size: 16, color: '#ffffff' }, // Biały tekst
                    margin: 10
                });

                // Sprawdzamy, czy osoba ma oboje rodziców, żeby połączyć ich kreską
                if (osoba.IdOjca !== null && osoba.IdMatki !== null) {
                    
                    // Tworzymy unikalne ID dla związku (żeby nie powielać kresek przy rodzeństwie)
                    let r1 = osoba.IdOjca;
                    let r2 = osoba.IdMatki;
                    let idUnii = "unia_" + (r1 < r2 ? r1 + "_" + r2 : r2 + "_" + r1);

                    // Jeśli ta para nie ma jeszcze węzła małżeństwa, tworzymy go
                    if (!unie[idUnii]) {
                        unie[idUnii] = true;
                        // Niewidzialny punkt złączenia między rodzicami
                        wezly.push({ id: idUnii, shape: 'dot', size: 1, color: '#888888', label: '' });
                        
                        // Kreski poziome od rodziców do punktu złączenia (bez grotów)
                        krawedzie.push({ from: r1, to: idUnii, arrows: '', color: '#888888' });
                        krawedzie.push({ from: r2, to: idUnii, arrows: '', color: '#888888' });
                    }

                    // Kreska od złączenia (małżeństwa) w dół do dziecka
                    krawedzie.push({ from: idUnii, to: osoba.Id, arrows: 'to', color: '#888888' });

                } else {
                    // Jeśli jest
