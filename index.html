<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Drzewo Genealogiczne</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 20px;
        }
        
        #drzewo { 
            width: 95%; 
            height: 750px; 
            border: 1px solid #333; 
            margin: 20px auto; 
            background-color: #1e1e1e; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h2 { margin-top: 10px; color: #ffffff; }
    </style>
</head>
<body>

    <h2>Moje Drzewo Genealogiczne</h2>
    <div id="drzewo"></div>

    <script type="text/javascript">
        async function zaladujDane() {
            try {
                let odpowiedz = await fetch("rodzina.json?t=" + new Date().getTime(), { cache: "no-store" });
                
                if (odpowiedz.ok) {
                    let daneRodziny = await odpowiedz.json();
                    rysujGraf(daneRodziny);
                } else {
                    console.error("Nie znaleziono pliku na serwerze GitHuba.");
                }
            } catch (error) {
                console.error("Błąd połączenia:", error);
            }
        }

        function rysujGraf(daneRodziny) {
            var wezly = [];
            var krawedzie = [];
            
            var dostepneId = new Set();
            daneRodziny.forEach(osoba => dostepneId.add(osoba.Id));

            // 1. TWÓJ POMYSŁ: Mapujemy roczniki na poziomy osi Y
            var poziomy = {};
            daneRodziny.forEach(osoba => { 
                poziomy[osoba.Id] = osoba.RokUrodzenia > 0 ? osoba.RokUrodzenia : 2000; 
            });

            // 2. WYRÓWNANIE MAŁŻONKÓW: Żeby linia więzi była prosta, rodzice muszą być na równej wysokości
            daneRodziny.forEach(osoba => {
                let idOjca = osoba.IdOjca;
                let idMatki = osoba.IdMatki;

                if (idOjca && idMatki && dostepneId.has(idOjca) && dostepneId.has(idMatki)) {
                    // Wyciągamy rok urodzenia starszego rodzica
                    let wyzszyPoziom = Math.min(poziomy[idOjca], poziomy[idMatki]);
                    // Zmuszamy oboje do "zawiśnięcia" na tej samej, równej osi
                    poziomy[idOjca] = wyzszyPoziom;
                    poziomy[idMatki] = wyzszyPoziom;
                }
            });

            var unie = {}; 

            daneRodziny.forEach(function(osoba) {
                // Rysujemy kafelki ludzi z przypisanym twardo poziomem (level)
                wezly.push({
                    id: osoba.Id,
                    label: osoba.Imie + ' ' + osoba.Nazwisko + '\nUr: ' + osoba.RokUrodzenia,
                    level: poziomy[osoba.Id], // <-- Tutaj program używa dat z osi
                    shape: 'box',
                    color: { background: '#2c3e50', border: '#34495e' },
                    font: { size: 16, color: '#ffffff' },
                    margin: 10
                });

                let idOjca = osoba.IdOjca;
                let idMatki = osoba.IdMatki;

                let maOjca = idOjca !== null && idOjca !== 0 && dostepneId.has(idOjca);
                let maMatke = idMatki !== null && idMatki !== 0 && dostepneId.has(idMatki);

                if (maOjca && maMatke) {
                    let idUnii = "unia_" + (idOjca < idMatki ? idOjca + "_" + idMatki : idMatki + "_" + idOjca);

                    if (!unie[idUnii]) {
                        unie[idUnii] = true;
                        
                        // Niewidzialny punkt więzi, dokładnie na tej samej osi co rodzice
                        wezly.push({ 
                            id: idUnii, 
                            level: poziomy[idOjca], // Dziedziczy oś rodziców
                            shape: 'dot', 
                            size: 0, 
                            color: 'rgba(0,0,0,0)', 
                            label: '' 
                        });
                        
                        // IDEALNIE PROSTE, SZTYWNE LINIE dla więzi rodziców (smooth: false)
                        krawedzie.push({ from: idOjca, to: idUnii, arrows: '', color: '#888888', smooth: false });
                        krawedzie.push({ from: idMatki, to: idUnii, arrows: '', color: '#888888', smooth: false });
                    }
                    
                    // Opadająca linia do dziecka (załamująca się pod kątem prostym)
                    krawedzie.push({ 
                        from: idUnii, 
                        to: osoba.Id, 
                        arrows: 'to', 
                        color: '#888888', 
                        smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0 } 
                    });

                } else {
                    if (maOjca) krawedzie.push({ from: idOjca, to: osoba.Id, arrows: 'to', color: '#888888', smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0 } });
                    if (maMatke) krawedzie.push({ from: idMatki, to: osoba.Id, arrows: 'to', color: '#888888', smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0 } });
                }
            });

            var pojemnik = document.getElementById('drzewo');
            var daneGrafu = { nodes: new vis.DataSet(wezly), edges: new vis.DataSet(krawedzie) };
            
            var opcje = {
                layout: { 
                    hierarchical: { 
                        direction: 'UD', 
                        levelSeparation: 120, // Odległość w pionie między pokoleniami
                        nodeSpacing: 250,     
                        treeSpacing: 300,
                        parentCentralization: true 
                    } 
                },
                physics: false 
            };

            new vis.Network(pojemnik, daneGrafu, opcje);
        }

        zaladujDane();
    </script>
</body>
</html>
